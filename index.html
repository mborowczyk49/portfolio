  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"b83d7341-944c-446f-91b4-9fec12aab395\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n* { box-sizing: border-box; margin: 0; padding: 0; }\nhtml { scroll-behavior: smooth; }\n:root {\n  --black: #111110;\n  --white: #FFFFFF;\n  --off: #F8F7F4;\n  --mid: #72706A;\n  --light: #A8A59E;\n  --rule: #E4E2DC;\n  --accent: #1847D4;\n  --cs1-accent: #B6543A;\n  --cs1-bg: linear-gradient(180deg, #F5E9DF 0%, #EAD6C5 100%);\n  --cs2-accent: #3F6B5E;\n  --cs2-bg: linear-gradient(180deg, #E4ECE7 0%, #D2DDD7 100%);\n  --cs3-accent: #3A4DB0;\n  --cs3-bg: linear-gradient(180deg, #E4E7F3 0%, #CFD4E9 100%);\n}\nbody { font-family: 'DM Sans', sans-serif; background: var(--white); color: var(--black); overflow-x: hidden; }\n\n/* NAV */\nnav {\n  position: fixed; top: 0; left: 0; right: 0; z-index: 200;\n  padding: 1.1rem 3rem; display: flex; justify-content: space-between; align-items: center;\n  background: rgba(255,255,255,0.94); backdrop-filter: blur(10px);\n  border-bottom: 1px solid var(--rule);\n}\n.nav-name { font-size: 0.8rem; font-weight: 400; letter-spacing: 0.02em; color: var(--black); text-decoration: none; cursor: pointer; }\n.nav-links { display: flex; gap: 2rem; list-style: none; }\n.nav-links a { font-size: 0.75rem; font-weight: 400; letter-spacing: 0.08em; text-transform: uppercase; color: var(--mid); text-decoration: none; transition: color 0.2s; cursor: pointer; }\n.nav-links a:hover { color: var(--black); }\n\n/* HOME */\n#home-page { min-height: 100vh; }\n\n/* HERO — Option B: photo left, bio right */\n.hero {\n  padding: 110px 3rem 5rem;\n  display: grid; grid-template-columns: 260px 1fr; gap: 4rem; align-items: start;\n  border-bottom: 1px solid var(--rule);\n}\n.hero-photo-wrap { position: sticky; top: 110px; }\n.hero-photo {\n  width: 100%; aspect-ratio: 3/4; object-fit: cover; object-position: center 15%;\n  display: block;\n}\n.hero-photo-placeholder {\n  width: 100%; aspect-ratio: 3/4; background: var(--off);\n  border: 1px solid var(--rule); display: flex; align-items: center; justify-content: center;\n  font-size: 0.75rem; color: var(--light); letter-spacing: 0.08em;\n}\n.hero-right { padding-top: 0.5rem; }\n.hero-eyebrow { font-size: 0.7rem; font-weight: 400; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); margin-bottom: 1.25rem; }\n.hero-name {\n  font-family: 'Instrument Serif', serif;\n  font-size: clamp(2.6rem, 4.5vw, 4.5rem); font-weight: 400;\n  line-height: 1.02; letter-spacing: -0.02em; margin-bottom: 0.4rem;\n}\n.hero-name em { font-style: italic; }\n.hero-role { font-size: 0.75rem; font-weight: 400; letter-spacing: 0.1em; text-transform: uppercase; color: var(--mid); margin-bottom: 2rem; padding-bottom: 2rem; border-bottom: 1px solid var(--rule); }\n.hero-bio { font-size: 1rem; font-weight: 300; line-height: 1.85; color: #3A3935; max-width: 52ch; margin-bottom: 2rem; }\n.hero-bio strong { font-weight: 500; color: var(--black); }\n.hero-ctas { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 2.5rem; }\n.btn { display: inline-block; padding: 0.65rem 1.5rem; font-size: 0.72rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; text-decoration: none; transition: all 0.2s; cursor: pointer; border: none; font-family: 'DM Sans', sans-serif; }\n.btn-dark { background: var(--black); color: var(--white); }\n.btn-dark:hover { background: var(--accent); }\n.btn-outline { background: transparent; border: 1px solid var(--mid); color: var(--mid); }\n.btn-outline:hover { border-color: var(--accent); color: var(--accent); }\n.hero-pills { display: flex; flex-wrap: wrap; gap: 0.4rem; }\n.hero-pill { font-size: 0.68rem; font-weight: 300; padding: 0.3rem 0.7rem; border-radius: 99px; background: #EEF2FF; color: var(--accent); }\n\n/* WORK */\n.work-section { padding: 5rem 3rem; }\n.section-header { display: flex; align-items: center; gap: 1.5rem; margin-bottom: 1rem; }\n.section-label { font-size: 0.68rem; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); white-space: nowrap; }\n.section-hr { flex: 1; height: 1px; background: var(--rule); }\n.section-title {\n  font-family: 'Instrument Serif', serif;\n  font-size: clamp(1.8rem, 3vw, 2.8rem); font-weight: 400;\n  line-height: 1.1; letter-spacing: -0.02em; margin-bottom: 3.5rem;\n}\n.section-title em { font-style: italic; }\n\n.cs-list { display: flex; flex-direction: column; }\n.cs-card {\n  display: grid; grid-template-columns: 0.85fr 1fr 1.7fr;\n  border: 1px solid var(--rule); border-bottom: none;\n  cursor: pointer; position: relative; overflow: hidden; transition: background 0.2s;\n}\n.cs-visual {\n  border-right: 1px solid var(--rule);\n  background: var(--cs-bg, var(--off));\n  overflow: hidden;\n  position: relative;\n  align-self: stretch;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n}\n.cs-visual svg {\n  width: 100%; height: 100%;\n  display: block;\n  object-fit: contain;\n  transition: transform 0.5s cubic-bezier(0.2,0.8,0.2,1);\n}\n.cs-card:hover .cs-visual svg { transform: scale(1.03); }\n.cs-card:last-child { border-bottom: 1px solid var(--rule); }\n.cs-card:hover { background: var(--off); }\n.cs-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--cs-accent, var(--accent)); transform: scaleY(0); transform-origin: bottom; transition: transform 0.3s; z-index: 2; }\n.cs-card:hover::before { transform: scaleY(1); }\n.cs-card .cs-tag,\n.cs-card .cs-read-link { color: var(--cs-accent, var(--accent)); }\n.cs-meta { padding: 2.25rem 2rem; border-right: 1px solid var(--rule); display: flex; flex-direction: column; }\n.cs-index { font-family: 'Instrument Serif', serif; font-size: 3.5rem; font-weight ght: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--mid); border-bottom: 1px solid var(--rule); padding-bottom: 0.5rem; margin-bottom: 0.75rem; }\n.skill-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; }\n.skill-tag { font-size: 0.68rem; font-weight: 300; padding: 0.3rem 0.7rem; border: 1px solid var(--rule); color: var(--black); transition: all 0.2s; background: var(--white); }\n.skill-tag:hover { border-color: var(--accent); color: var(--accent); }\n.edu-item + .edu-item { margin-top: 1rem; }\n.edu-degree { font-size: 0.75rem; font-weight: 500; color: var(--black); }\n.edu-school { font-size: 0.68rem; font-weight: 300; color: var(--accent); margin-top: 0.1rem; }\n\n/* CONTACT */\n.contact-section { padding: 5rem 3rem; border-top: 1px solid var(--rule); }\n.contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5rem; }\n.contact-head { font-family: 'Instrument Serif', serif; font-size: clamp(2.2rem, 3.5vw, 3.8rem); font-weight: 400; line-height: 1.05; letter-spacing: -0.02em; margin-bottom: 1.25rem; }\n.contact-head em { font-style: italic; }\n.contact-desc { font-size: 0.95rem; font-weight: 300; line-height: 1.8; color: var(--mid); max-width: 40ch; }\n.contact-links-list { display: flex; flex-direction: column; padding-top: 0.25rem; }\n.contact-row { display: flex; justify-content: space-between; align-items: center; padding: 1.1rem 0; border-bottom: 1px solid var(--rule); text-decoration: none; transition: all 0.2s; gap: 1rem; }\n.contact-row:first-child { border-top: 1px solid var(--rule); }\n.contact-row:hover .cl-label { color: var(--accent); }\n.contact-row:hover .cl-arrow { transform: translate(3px,-3px); color: var(--accent); }\n.cl-label { font-family: 'Instrument Serif', serif; font-size: 1.1rem; font-weight: 400; color: var(--black); transition: color 0.2s; }\n.cl-value { font-size: 0.7rem; font-weight: 300; color: var(--light); letter-spacing: 0.04em; flex: 1; text-align: right; }\n.cl-arrow { font-size: 1rem; color: var(--rule); transition: all 0.2s; }\n\nfooter { padding: 1.5rem 3rem; border-top: 1px solid var(--rule); display: flex; justify-content: space-between; align-items: center; }\n.footer-left { font-size: 0.68rem; font-weight: 300; color: var(--mid); }\n.footer-right { font-size: 0.68rem; font-weight: 300; color: var(--rule); }\n\n/* CASE STUDY DETAIL */\n#detail-page {\n  display: none; position: fixed; inset: 0; z-index: 150;\n  background: var(--white); overflow-y: auto;\n  transform: translateX(100%); transition: transform 0.45s cubic-bezier(0.4,0,0.2,1);\n}\n#detail-page.open { transform: translateX(0); }\n\n.detail-nav {\n  padding: 4rem 3rem 0;\n}\n.back-btn {\n  display: inline-flex; align-items: center; gap: 0.5rem;\n  font-size: 0.8rem; font-weight: 400; letter-spacing: 0.02em;\n  color: var(--mid); cursor: pointer; border: none; background: none;\n  transition: color 0.2s; text-decoration: none;\n  font-family: 'DM Sans', sans-serif; padding: 0; margin-bottom: 2.5rem;\n}\n.back-btn:hover { color: var(--accent); }\n.back-btn .arrow { font-size: 0.9rem; transition: transform 0.2s; }\n.back-btn:hover .arrow { transform: translateX(-3px); }\n.detail-nav-label { display: none; }\n\n.detail-hero { padding: 0 3rem 3rem; border-bottom: 1px solid var(--rule); }\n.detail-tag { font-size: 0.68rem; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); margin-bottom: 1.25rem; }\n.detail-title {\n  font-family: 'Instrument Serif', serif;\n  font-size: clamp(2rem, 4vw, 4rem); font-weight: 400;\n  line-height: 1.08; letter-spacing: -0.02em; max-width: 20ch; margin-bottom: 2rem;\n}\n.detail-meta-row { display: flex; gap: 3rem; flex-wrap: wrap; }\n.detail-meta-label { font-size: 0.62rem; font-weight: 500; letter-spacing: 0.16em; text-transform: uppercase; color: var(--light); margin-bottom: 0.3rem; }\n.detail-meta-value { font-size: 0.82rem; font-weight: 400; color: var(--black); }\n\n.detail-body { padding: 3rem; max-width: 860px; }\n. hift-label { font-size: 0.6rem; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--light); margin-bottom: 0.4rem; }\n.shift-text { font-size: 0.9rem; font-weight: 400; color: var(--black); line-height: 1.5; font-style: italic; font-family: 'Instrument Serif', serif; }\n.shift-to .shift-label { color: rgba(255,255,255,0.6); }\n.shift-to .shift-text { color: var(--white); }\n\n.detail-why { background: var(--off); border: 1px solid var(--rule); padding: 2rem; }\n.detail-why-list { list-style: none; display: flex; flex-direction: column; gap: 0.75rem; margin-top: 1rem; }\n.detail-why-list li { display: flex; align-items: flex-start; gap: 0.75rem; font-size: 0.9rem; font-weight: 300; line-height: 1.65; color: #333; }\n.detail-why-list li::before { content: '→'; color: var(--accent); font-size: 0.8rem; margin-top: 0.15rem; flex-shrink: 0; }\n\n.roadmap-steps { display: flex; flex-direction: column; gap: 0.75rem; }\n.roadmap-step { display: grid; grid-template-columns: 120px 1fr; gap: 1.5rem; padding: 1.25rem; border: 1px solid var(--rule); align-items: start; }\n.rs-phase { font-size: 0.65rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); }\n.rs-years { font-size: 0.7rem; font-weight: 300; color: var(--light); margin-top: 0.2rem; }\n.rs-desc { font-size: 0.88rem; font-weight: 300; line-height: 1.65; color: #333; }\n\n/* REVEAL */\n.reveal { opacity: 0; transform: translateY(20px); transition: opacity 0.7s ease, transform 0.7s ease; }\n.reveal.visible { opacity: 1; transform: translateY(0); }\n\n/* RESPONSIVE */\n@media (max-width: 900px) {\n  nav { padding: 1rem 1.5rem; }\n  .hero { grid-template-columns: 1fr; padding: 100px 1.5rem 3rem; gap: 2rem; }\n  .hero-photo-wrap { position: static; }\n  .hero-photo, .hero-photo-placeholder { aspect-ratio: 1/1; max-height: 340px; width: 100%; object-position: center 10%; }\n  .work-section, .about-section, .contact-section { padding: 3rem 1.5rem; }\n  .cs-card { grid-template-columns: 1fr; }\n  .cs-meta { border-right: none; border-bottom: 1px solid var(--rule); }\n  .cs-visual { border-right: none; border-bottom: 1px solid var(--rule); min-height: 220px; }\n  .about-grid, .contact-grid { grid-template-columns: 1fr; gap: 3rem; }\n  .detail-hero, .detail-body { padding: 2rem 1.5rem; }\n  .detail-nav { padding: 2rem 1.5rem 0; }\n  .detail-impact-grid { grid-template-columns: 1fr; }\n  .detail-shift { grid-template-columns: 1fr; }\n  .shift-arrow { transform: rotate(90deg); }\n  footer { padding: 1.5rem; flex-direction: column; gap: 0.4rem; text-align: center; }\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<nav>\n  <a class=\"nav-name\" onclick=\"goHome()\">Margaret Borowczyk, Ph.D.<\u002Fa>\n  <ul class=\"nav-links\">\n    <li><a onclick=\"goHome(); scrollToSection('work')\">Work<\u002Fa><\u002Fli>\n    <li><a onclick=\"goHome(); scrollToSection('about')\">About<\u002Fa><\u002Fli>\n    <li><a onclick=\"goHome(); scrollToSection('contact')\">Contact<\u002Fa><\u002Fli>\n  <\u002Ful>\n<\u002Fnav>\n\n<!-- ══════════════════════════════════\n     HOME PAGE\n══════════════════════════════════ -->\n<div id=\"home-page\">\n\n  <!-- HERO: Option B — Photo left, bio right -->\n  <div class=\"hero\">\n    <div class=\"hero-photo-wrap\">\n      <img src=\"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAYEBAUEBAYFBQUGBgYHCQ4JCQgICRINDQoOFRIWFhUSFBQXGiEcFxgfGRQUHScdHyIjJSUlFhwpLCgkKyEkJST/2wBDAQYGBgkICREJCREkGBQYJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCT/wAARCAKbAfQDASIAAhEBAxEB/8QAHwAAAQUBAQEBAQEAAAAAAAAAAAECAwQFBgcICQoL/8QAtRAAAgEDAwIEAwUFBAQAAAF9AQIDAAQRBRIhMUEGE1FhByJxFDKBkaEII0KxwRVS0fAkM2JyggkKFhcYGRolJicoKSo0NTY3ODk6Q0RFRkdISUpTVFVWV1hZWmNkZWZnaGlqc3R1dnd4eXqDhIWGh4iJipKTlJWWl5iZmqKjpKWmp6ipqrKztLW2t7i5usLDxMXGx8jJytLT1NXW19jZ2uHi4+Tl5ufo6erx8vP09fb3+Pn6/8QAHwEAAwEBAQEBAQEBAQAAAAAAAAECAwQFBgcICQoL/8QAtREAAgECBAQDBAcFBAQAAQJ3AAECAxEEBSExBhJBUQdhcRMiMoEIFEKRobHBCSMzUvAVYnLRChYkNOEl8RcYGRomJyg \u002Fp>\n      <p class=\"hero-bio\">\n        Linguist turned researcher. I work in high-stakes, regulated spaces (government services, financial systems) where the gap between how institutions communicate and how people actually experience that communication has real costs. I give teams the evidence to act on it.\n      <\u002Fp>\n      <div class=\"hero-ctas\">\n        <a href=\"#work\" class=\"btn btn-dark\">View Case Studies<\u002Fa>\n        <a href=\"https://docs.google.com/document/d/1uFaKBuQks6lnYCGJP-YkIHo-8Bh3DD4LUYSWiXjmKGc/edit?usp=sharing\" target=\"_blank\" class=\"btn btn-outline\">View CV<\u002Fa>\n      <\u002Fdiv>\n      <div class=\"hero-pills\">\n        <span class=\"hero-pill\">Govtech<\u002Fspan>\n        <span class=\"hero-pill\">Mixed methods<\u002Fspan>\n        <span class=\"hero-pill\">Trauma-informed<\u002Fspan>\n        <span class=\"hero-pill\">Service design<\u002Fspan>\n        <span class=\"hero-pill\">AI workflows<\u002Fspan>\n        <span class=\"hero-pill\">Ph.D. Linguistics<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- WORK -->\n  <section class=\"work-section\" id=\"work\">\n    <div class=\"section-header reveal\">\n      <span class=\"section-label\">Selected Work<\u002Fspan>\n      <div class=\"section-hr\"><\u002Fdiv>\n    <\u002Fdiv>\n    <h2 class=\"section-title reveal\">Research that <em>moved<\u002Fem><br>the roadmap<\u002Fh2>\n\n    <div class=\"cs-list\">\n\n      <div class=\"cs-card reveal\" style=\"--cs-accent: var(--cs1-accent); --cs-bg: var(--cs1-bg);\" onclick=\"openCase('cs1')\">\n        <div class=\"cs-meta\">\n          <span class=\"cs-index\">01<\u002Fspan>\n          <div>\n            <div class=\"cs-tag\">Fintech · Block · Square<\u002Fdiv>\n            <div class=\"cs-methods-list\">Discovery research<br>Customer segmentation<br>Enterprise B2B<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"cs-visual\" data-visual=\"cs1\"><\u002Fdiv>\n        <div class=\"cs-body\">\n          <div>\n            <h3 class=\"cs-title-text\">What Square needed to know before investing in enterprise restaurants<\u002Fh3>\n            <p class=\"cs-summary-text\">Square’s product, sales, and support teams each operated from different assumptions about what enterprise restaurant operators needed, and there was no research-grounded framework to resolve it. I led a three-phase study across 17 restaurant leaders that gave all three functions a common language for the first time.<\u002Fp>\n          <\u002Fdiv>\n          <div>\n            <div class=\"cs-outcome-bar\">\n              <span class=\"cs-outcome-label\">Outcome:<\u002Fspan>\n              <span class=\"cs-outcome-value\">Segmentation framework adopted · Roadmap priorities reshaped · Senior leadership aligned<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"cs-read-link\">Read case study <span>→<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"cs-card reveal\" style=\"--cs-accent: var(--cs2-accent); --cs-bg: var(--cs2-bg);\" onclick=\"openCase('cs2')\">\n        <div class=\"cs-meta\">\n          <span class=\"cs-index\">02<\u002Fspan>\n          <div>\n            <div class=\"cs-tag\">Govtech · Ad Hoc · VA.gov<\u002Fdiv>\n            <div class=\"cs-methods-list\">Developer experience research<br>Development infrastructure<br>DevSecOps<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"cs-visual\" data-visual=\"cs2\"><\u002Fdiv>\n        <div class=\"cs-body\">\n          <div>\n            <h3 class=\"cs-title-text\">Finding the bottlenecks blocking a federal developer platform from scaling<\u002Fh3>\n            <p class=\"cs-summary-text\">Timely healthcare for Veterans depends on VA developers being able to build and ship quickly. When an internal platform meant to accelerate that work stalled on adoption, I identified the specific bottlenecks holding it back and gave the team a clear, prioritized path forward.<\u002Fp>\n          <\u002Fdiv>\n          <div>\n            <div class=\"cs-outcome-bar\">\n              <span class=\"cs-outcome-label\">Outcome:<\u002Fspan>\n              <span class=\"cs-outcome-value\">OKRs reshaped · Template standards prioritized · Knowledge-sharing forum launched<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"cs-read-link\">Read case study <span>→<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"cs-card reveal\" style=\"--cs-accent: var(--cs3-accent); --cs-bg: var(--cs3-bg);\" onclick=\"openCase('cs3')\">\n        <div class=\"cs-meta\">\n          <span class=\"cs-index\">03<\u002Fspan>\n          <div>\n            <div class=\"cs-tag\">Fintech · Intuit<\u002Fdiv>\n            <div class=\"cs-methods-list\">Mixed methods research<br>Ecosystem scope<br>Large-scale survey research<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"cs-visual\" data-visual=\"cs3\"><\u002Fdiv>\n        <div class=\"cs-body\">\n          <div>\n            <h3 class=\"cs-title-text\">Making sense of drop-off in Credit Karma and TurboTax's first joint filing experience<\u002Fh3>\n            <p class=\"cs-summary-text\">Credit Karma and TurboTax launched their first joint tax experience — and users were abandoning it before ever filing. I led the qualitative research that explained why, connecting live behavioral observations to survey-scale patterns across a full tax season.<\u002Fp>\n          <\u002Fdiv>\n          <div>\n            <div class=\"cs-outcome-bar\">\n              <span class=\"cs-outcome-label\">Outcome:<\u002Fspan>\n              <span class=\"cs-outcome-value\">+12% login success · +3% conversion · New low-commitment preview experience shipped<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"cs-read-link\">Read case study <span>→<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ABOUT -->\n  <section class=\"about-section\" id=\"about\">\n    <div class=\"section-header reveal\">\n      <span class=\"section-label\">About<\u002Fspan>\n      <div class=\"section-hr\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"about-grid\">\n      <div class=\"about-body reveal\">\n        <p>I'm a PhD-trained UX researcher and service designer with a background in <strong>applied linguistics<\u002Fstrong>. That training shapes how I work: I pay close attention to how people describe their experiences, where language breaks down, and what goes unsaid.<\u002Fp>\n        <p>My work centers on a consistent problem: the systems that most shape people's lives (taxes, government services, healthcare, financial tools) are often harder to navigate than they need to be. I study why that friction exists, what it costs people, and how to design systems that are clearer, more humane, and easier to use.<\u002Fp>\n        <p>I'm especially drawn to <strong>trauma-informed<\u002Fstrong> and non-extractive research practices. In my work, I've built AI-assisted workflows to scale qualitative insight, facilitated alignment across government and engineering teams, and supported designers in strengthening their research practice.<\u002Fp>\n        <div class=\"about-actions\">\n          <a href=\"https://docs.google.com/document/d/1uFaKBuQks6lnYCGJP-YkIHo-8Bh3DD4LUYSWiXjmKGc/edit?usp=sharing\" target=\"_blank\" class=\"btn btn-dark\">View CV<\u002Fa>\n          <button class=\"btn btn-outline\" onclick=\"scrollToSection('contact')\">Get in Touch<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"skills-col reveal\">\n        <div>\n          <div class=\"skill-group-label\">Research Methods<\u002Fdiv>\n          <div class=\"skill-tags\">\n            <span class=\"skill-tag\">Usability Testing<\u002Fspan>\n            <span class=\"skill-tag\">In-Depth Interviews<\u002Fspan>\n            <span class=\"skill-tag\">Survey Research<\u002Fspan>\n            <span class=\"skill-tag\">Observational Studies<\u002Fspan>\n            <span class=\"skill-tag\">Concept Testing<\u002Fspan>\n            <span class=\"skill-tag\">Workshop Facilitation<\u002Fspan>\n            <span class=\"skill-tag\">Trauma-Informed Research<\u002Fspan>\n            <span class=\"skill-tag\">AI-Assisted Synthesis<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div class=\"skill-group-label\">Tools<\u002Fdiv>\n          <div class=\"skill-tags\">\n            <span class=\"skill-tag\">Figma<\u002Fspan>\n            <span class=\"skill-tag\">Dovetail<\u002Fspan>\n            <span class=\"skill-tag\">Qualtrics<\u002Fspan>\n            <span class=\"skill-tag\">UserTesting<\u002Fspan>\n            <span class=\"skill-tag\">Maze<\u002Fspan>\n            <span class=\"skill-tag\">NotebookLM<\u002Fspan>\n            <span class=\"skill-tag\">SPSS<\u002Fspan>\n            <span class=\"skill-tag\">Rally<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div class=\"skill-group-label\">Education<\u002Fdiv>\n          <div class=\"edu-item\"><div class=\"edu-degree\">Ph.D. Applied Linguistics<\u002Fdiv><div class=\"edu-school\">Georgetown University<\u002Fdiv><\u002Fdiv>\n          <div class=\"edu-item\"><div class=\"edu-degree\">M.S.Ed. Intercultural Communication<\u002Fdiv><div class=\"edu-school\">University of Pennsylvania<\u002Fdiv><\u002Fdiv>\n          <div class=\"edu-item\"><div class=\"edu-degree\">B.A. Linguistics &amp; Comparative Literature<\u002Fdiv><div class=\"edu-school\">University of Pennsylvania<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- CONTACT -->\n  <section class=\"contact-section\" id=\"contact\">\n    <div class=\"contact-grid\">\n      <div class=\"reveal\">\n        <h2 class=\"contact-head\">Let's <em>talk.<\u002Fem><\u002Fh2>\n        <p class=\"contact-desc\">I'm currently open to senior/staff UX Researcher and Service Designer roles in civic tech, government, and mission-driven organizations, as well as consulting and research education partnerships.<\u002Fp>\n        <p class=\"contact-desc\" style=\"margin-top:1rem;\">If this resonates with your work, I'd love to connect. <a href=\"https://www.linkedin.com/in/margaret-borowczyk\" target=\"_blank\" style=\"color:var(--accent); text-decoration:none;\">LinkedIn<\u002Fa> is the best place to reach me.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"contact-links-list reveal\">\n        <a href=\"mailto:mborowczyk49@gmail.com\" class=\"contact-row\">\n          <span class=\"cl-label\">Email<\u002Fspan>\n          <span class=\"cl-value\">mborowczyk49@gmail.com<\u002Fspan>\n          <span class=\"cl-arrow\">↗<\u002Fspan>\n        <\u002Fa>\n        <a href=\"https://www.linkedin.com/in/margaret-borowczyk\" target=\"_blank\" class=\"contact-row\">\n          <span class=\"cl-label\">LinkedIn<\u002Fspan>\n          <span class=\"cl-value\">linkedin.com/in/margaret-borowczyk<\u002Fspan>\n          <span class=\"cl-arrow\">↗<\u002Fspan>\n        <\u002Fa>\n        <a href=\"https://docs.google.com/document/d/1uFaKBuQks6lnYCGJP-YkIHo-8Bh3DD4LUYSWiXjmKGc/edit?usp=sharing\" target=\"_blank\" class=\"contact-row\">\n          <span class=\"cl-label\">CV / Résumé<\u002Fspan>\n          <span class=\"cl-value\">View Google Doc<\u002Fspan>\n          <span class=\"cl-arrow\">↗<\u002Fspan>\n        <\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <footer>\n    <span class=\"footer-left\">Margaret Borowczyk, Ph.D. — UX Researcher &amp; Service Designer<\u002Fspan>\n    <span class=\"footer-right\">Arlington, VA · 2026<\u002Fspan>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n<!-- ══════════════════════════════════\n     CASE STUDY DETAIL PAGE\n══════════════════════════════════ -->\n<div id=\"detail-page\">\n  <div class=\"detail-nav\">\n    <a class=\"back-btn\" onclick=\"closeCase(); return false;\" href=\"#\">\n      <span class=\"arrow\">←<\u002Fspan> Back to homepage\n    <\u002Fa>\n    <span class=\"detail-nav-label\" id=\"detail-nav-label\"><\u002Fspan>\n  <\u002Fdiv>\n  <div id=\"detail-content\"><\u002Fdiv>\n<\u002Fdiv>\n\n<script src=\"bcaefe71-a668-48d7-8869-8b3036fa8a7d\"><\u002Fscript>\n<script>\nfunction goHome() {\n  const dp = document.getElementById('detail-page');\n  if (dp.classList.contains('open')) closeCase();\n}\n\nfunction scrollToSection(id) {\n  setTimeout(() => {\n    const el = document.getElementById(id);\n    if (el) el.scrollIntoView({ behavior: 'smooth' });\n  }, 60);\n}\n\nfunction openCase(id) {\n  const dp = document.getElementById('detail-page');\n  const accents = { cs1: '#B6543A', cs2: '#3F6B5E', cs3: '#3A4DB0' };\n  dp.style.setProperty('--accent', accents[id] || '#1847D4');\n  document.getElementById('detail-nav-label').textContent = cases[id].navLabel;\n  document.getElementById('detail-content').innerHTML = renderCase(id);\n  dp.style.display = 'block';\n  document.body.style.overflow = 'hidden';\n  requestAnimationFrame(() => requestAnimationFrame(() => dp.classList.add('open')));\n  dp.scrollTop = 0;\n}\n\nfunction closeCase() {\n  const dp = document.getElementById('detail-page');\n  dp.classList.remove('open');\n  document.body.style.overflow = '';\n  setTimeout(() => { dp.style.display = 'none'; }, 450);\n}\n\n/* ── CASE STUDY DATA ── */\nconst cases = {\n\n  cs1: {\n    navLabel: 'Case Study 01',\n    tag: 'Fintech · Block · Square',\n    title: 'Defining what enterprise restaurant operators actually need — before Square’s next strategic investment',\n    meta: [\n      { label: 'Organization', value: 'Block / Square' },\n      { label: 'My Role', value: 'Lead researcher' },\n      { label: 'Timeline', value: 'July 2025' },\n      { label: 'Methods', value: 'In-depth interviews, Stakeholder interviews, Literature review' },\n    ],\n    sections: [\n      {\n        label: 'The Challenge',\n        html: `<p>Square had an ambitious goal: grow from supporting independent restaurants to winning enterprise chains at scale. But the enterprise segment was largely a blind spot. Square was losing deals with enterprise restaurants, but there was no shared, research-grounded picture of what it might take to win with that segment and differentiate from other Point of Sale providers. Product, sales, and support each operated from different assumptions, and strategic investment was moving forward without a common direction.<\u002Fp>`\n      },\n      {\n        label: 'My Role & Approach',\n        html: `<p>As lead researcher, I designed a three-phase study to build the framework Square needed before making that investment.<\u002Fp>\n        <p>I started with a structured literature review, using internal data and external industry research, to ground the work and sharpen the open questions. From there, I ran stakeholder interviews across enterprise sales, product, partnerships, and account management to map institutional assumptions and surface where internal models diverged. Then I went to the operators themselves: 17 one-on-one interviews with C-suite executives, Directors, and Multi-unit Franchisees across 16 enterprise restaurant brands — a deliberate mix of Square customers and non-customers, ranging from regional chains to national ones.<\u002Fp>`\n      },\n      {\n        label: 'What I Found',\n        findings: [\n          { title: 'Needs shift with scale', body: 'Enterprise operators need a platform that evolves with them. What a chain needs at its 10th location is qualitatively different from what it needs at its 100th, and vendors who solve well for one stage often lose relevance at the next.' },\n          { title: 'Peer trust over demos', body: 'By the time an enterprise operator is formally evaluating a POS, they\\'ve already talked to peers running similarly-sized chains. A polished demo rarely displaces a trusted endorsement. What actually moved decisions was seeing the product working inside a real operation.' },\n          { title: 'Support expectations set in early', body: 'At enterprise scale, a platform issue touches hundreds of locations simultaneously. Operators hold vendors to a much higher bar on response time and dedicated support, and they start expecting that level of partnership earlier in their growth than most vendors anticipate.' },\n        ]\n      },\n      {\n        label: 'Impact',\n        impact: [\n          { metric: 'Recs', label: 'Delivered strategic recommendations across Product, Sales/GTM, and Support, each grounded in operator-validated evidence' },\n          { metric: 'Segmentation', label: 'Partnered with quantitative analysts to develop a scale-based segmentation model now used as shared language across restaurant teams at Block' },\n          { metric: 'Product Roadmap', label: 'Directly shaped roadmap prioritization of multi-location capabilities, API/integration investments, and enterprise support model design' },\n          { metric: 'Customer Strategy', label: 'Findings were presented to senior leadership and used to resolve long-standing cross-functional disagreement about where to invest' },\n        ]\n      }\n    ]\n  },\n\n  cs2: {\n    navLabel: 'Case Study 02',\n    tag: 'Govtech · Ad Hoc · VA.gov',\n    title: 'Scaling a federal developer platform by surfacing what engineers actually needed',\n    meta: [\n      { label: 'Organization', value: 'Ad Hoc / Department of Veterans Affairs' },\n      { label: 'My Role', value: 'Lead researcher' },\n      { label: 'Timeline', value: 'Nov 2024' },\n      { label: 'Methods', value: 'Stakeholder interviews, User interviews, Concept testing' },\n    ],\n    sections: [\n      {\n        label: 'The Challenge',\n        html: `<p>Timely access to VA healthcare depends on internal developer teams being able to build APIs and apps quickly and safely. My team was building an internal developer platform to consolidate that infrastructure, automating key processes and enabling self-service to speed up delivery, with a goal of 50% platform growth within the year. But adoption was stalling, and the team didn\\'t know which workflow bottlenecks developers found most painful or where to focus first.<\u002Fp>`\n      },\n      {\n        label: 'My Role & Approach',\n        html: `<p>As the sole researcher, I designed a study to identify the highest-friction bottlenecks in developers\\' workflows and give the team a clear, prioritized path forward.<\u002Fp>\n        <p>I started with stakeholder interviews across the PM and tech lead for each of six engineering teams, mapping their intended problem spaces and proposed solutions. Then I brought in the developers themselves: interviews with six client teams, each including a structured exercise to rank pain point severity and surface reactions to proposed fixes. By comparing what stakeholders believed to be true with what developers were actually experiencing, I could identify the biggest gaps and what was most worth fixing.<\u002Fp>`\n      },\n      {\n        label: 'What I Found',\n        findings: [\n          { title: 'Fragmented guidance bred shadow work', body: 'Inconsistent platform guidance had led teams to build their own CI/CD and deployment templates, fragmenting standards and eroding trust in the official path.' },\n          { title: 'Abstract docs couldn\\'t change behavior', body: 'The platform provided limited examples of working code for the workflows developers needed most. Faced with incomplete guidance on something as critical as deployment pipelines, developers stuck with what they already had running.' },\n          { title: 'Knowledge silos compounded the problem', body: 'Teams had no structured way to share what they\\'d learned or get help from peers outside their own group. The teams that had worked around the gaps held knowledge that could have accelerated everyone else, but there was no structured mechanism to surface it.' },\n        ]\n      },\n      {\n        label: 'Impact',\n        impact: [\n          { metric: 'OKRs', label: 'Directly shaped quarterly OKRs, aligning platform priorities with the pain points developers themselves rated as most severe' },\n          { metric: 'Templates', label: 'Secured prioritization of standardized template development in the highest-friction areas' },\n          { metric: 'Office Hours', label: 'Helped redesign engineering office hours into a structured knowledge-sharing forum, reducing support bottlenecks across teams' },\n          { metric: 'Code Examples', label: 'Validated prioritizing a live demo application with production-ready code examples to support self-service adoption' },\n        ]\n      }\n    ]\n  },\n\n  cs3: {\n    navLabel: 'Case Study 03',\n    tag: 'Fintech · Intuit · TurboTax × Credit Karma',\n    title: 'Understanding why Credit Karma users abandoned TurboTax — and what rebuilt their trust',\n    meta: [\n      { label: 'Organization', value: 'Intuit — TurboTax & Credit Karma' },\n      { label: 'My Role', value: 'Co-lead researcher — cross-product, full tax season' },\n      { label: 'Timeline', value: 'January – April 2022 (Tax Season)' },\n      { label: 'Methods', value: 'Observational sessions, Large-scale survey' },\n    ],\n    sections: [\n      {\n        label: 'The Challenge',\n        html: `<p>For the first time, Credit Karma and TurboTax were offering a joint tax experience and users were dropping off early in the flow. The teams knew abandonment was happening, but not why, or what to do about it.<\u002Fp>`\n      },\n      {\n        label: 'My Role & Approach',\n        html: `<p>As co-lead researcher, I owned the qualitative side of a mixed-methods study designed to surface not just where users were dropping off, but why — and what would need to change to rebuild trust.<\u002Fp>\n        <p>I led 22 two-hour observational sessions via Lookback, watching participants complete their actual taxes inside the joint Credit Karma × TurboTax flow, with live observers from Design, PM, and Analytics. I synthesized those sessions into daily summaries and illustrated key patterns with video clips. My co-researcher led two large-scale surveys: a pre-season study of 500 users and a peak-season study of 4,828, and we analyzed the combined results together in SPSS, segmenting by user type to connect the quantitative drop-off patterns to the qualitative reasoning we\\'d uncovered.<\u002Fp>`\n      },\n      {\n        label: 'What We Found',\n        findings: [\n          { title: 'Users arrived to explore, not to file', body: 'Users clicked tax messages in Credit Karma to gather information, not to begin filing. The login wall interrupted exploration at the moment users were still evaluating value.' },\n          { title: 'Dual logins broke trust and momentum', body: 'Dual sign-in requirements broke momentum and trust. Users didn\\'t understand why they needed to authenticate twice, and many didn\\'t try again.' },\n          { title: 'Prior scanning anxiety carried over', body: 'Previous issues with credit card and ID scanning undermined confidence in W-2 photo capture, making users hesitant to rely on W-2 photo snap for tax filing.' },\n        ]\n      },\n      {\n        label: 'Impact',\n        impact: [\n          { metric: 'Roadmap', label: 'Shaped multiple high-priority Credit Karma and TurboTax roadmap initiatives by grounding decisions in validated user friction and trust gaps' },\n          { metric: '+12%', label: 'Login success rate — cross-product authentication flows redesigned, reducing abandonment at a critical conversion point' },\n          { metric: 'Preview', label: 'Introduced a low-commitment TurboTax preview experience within Credit Karma, improving user engagement during early-stage exploration' },\n          { metric: '+3%', label: 'Conversion lift — expanded W-2 entry options increased user control and rebuilt trust in document capture' },\n        ]\n      }\n    ]\n  }\n\n};\n\n/* ── RENDER ── */\nfunction renderCase(id) {\n  const c = cases[id];\n  let html = `<div class=\"detail-hero\">\n    <div class=\"detail-tag\">${c.tag}<\u002Fdiv>\n    <h1 class=\"detail-title\">${c.title}<\u002Fh1>\n    <div class=\"detail-meta-row\">${c.meta.map(m => `<div><div class=\"detail-meta-label\">${m.label}<\u002Fdiv><div class=\"detail-meta-value\">${m.value}<\u002Fdiv><\u002Fdiv>`).join('')}<\u002Fdiv>\n  <\u002Fdiv><div class=\"detail-body\">`;\n\n  c.sections.forEach(sec => {\n    html += `<div class=\"detail-section\"><div class=\"detail-section-label\">${sec.label}<\u002Fdiv>`;\n    if (sec.html) html += sec.html;\n    if (sec.findings) sec.findings.forEach((f, i) => {\n      html += `<div class=\"detail-finding\"><div class=\"df-num\">${String(i+1).padStart(2,'0')}<\u002Fdiv><div class=\"df-title\">${f.title}<\u002Fdiv><div class=\"df-body\">${f.body}<\u002Fdiv><\u002Fdiv>`;\n    });\n    if (sec.impact) {\n      html += `<div class=\"detail-impact-grid\">`;\n      sec.impact.forEach(item => { html += `<div class=\"impact-cell\"><div class=\"impact-metric\">${item.metric}<\u002Fdiv><div class=\"impact-label\">${item.label}<\u002Fdiv><\u002Fdiv>`; });\n      html += `<\u002Fdiv>`;\n    }\n    if (sec.shift) {\n      html += `<div class=\"detail-shift\"><div class=\"shift-from\"><div class=\"shift-label\">Before<\u002Fdiv><div class=\"shift-text\">${sec.shift.from}<\u002Fdiv><\u002Fdiv><div class=\"shift-arrow\">→<\u002Fdiv><div class=\"shift-to\"><div class=\"shift-label\">After<\u002Fdiv><div class=\"shift-text\">${sec.shift.to}<\u002Fdiv><\u002Fdiv><\u002Fdiv>`;\n    }\n    if (sec.roadmap) {\n      html += `<div class=\"roadmap-steps\">`;\n      sec.roadmap.forEach(s => { html += `<div class=\"roadmap-step\"><div><div class=\"rs-phase\">${s.phase}<\u002Fdiv><div class=\"rs-years\">${s.years}<\u002Fdiv><\u002Fdiv><div class=\"rs-desc\">${s.desc}<\u002Fdiv><\u002Fdiv>`; });\n      html += `<\u002Fdiv>`;\n    }\n    if (sec.why) {\n      html += `<div class=\"detail-why\"><ul class=\"detail-why-list\">`;\n      sec.why.forEach(item => { html += `<li>${item}<\u002Fli>`; });\n      html += `<\u002Ful><\u002Fdiv>`;\n    }\n    html += `<\u002Fdiv>`;\n  });\n\n  html += `<\u002Fdiv>`;\n  return html;\n}\n\n/* ── SCROLL REVEAL ── */\nconst obs = new IntersectionObserver((entries) => {\n  entries.forEach((e, i) => {\n    if (e.isIntersecting) {\n      setTimeout(() => e.target.classList.add('visible'), i * 90);\n      obs.unobserve(e.target);\n    }\n  });\n}, { threshold: 0.07 });\ndocument.querySelectorAll('.reveal').forEach(el => obs.observe(el));\n\n/* ── INJECT CASE-CARD VISUALS ── */\n(function injectVisuals() {\n  if (!window.VISUALS) return;\n  const map = { cs1: 'cs1_hero', cs2: 'cs2_hero', cs3: 'cs3_hero' };\n  document.querySelectorAll('.cs-visual').forEach(el => {\n    const key = el.dataset.visual;\n    if (key && window.VISUALS[map[key]]) el.innerHTML = window.VISUALS[map[key]];\n  });\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
